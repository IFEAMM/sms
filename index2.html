<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار إرسال SMS</title>

    <style>
        body {
            background: #0f172a;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            box-sizing: border-box;
            background: #334155;
            color: white;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        #status {
            margin-top: 15px;
            min-height: 20px;
            word-break: break-word;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>اختبار إرسال الرسالة</h2>

    <input
        type="tel"
        id="phone"
        placeholder="رقم الجوال (مثال: 55xxxxxxx)"
        oninput="this.value=this.value.replace(/[^0-9]/g,'')">

    <button onclick="sendSMS()">إرسال</button>

    <p id="status"></p>
</div>

<script>
async function sendSMS() {
    const phone = document.getElementById('phone').value.trim();
    const status = document.getElementById('status');

    if (!phone) {
        status.innerText = "⚠️ أدخل رقم الجوال";
        return;
    }

    status.innerText = "📡 جاري الإرسال...";

    try {
        const response = await fetch(
            'https://prodokd.maanaginx.com/care/api/user/sendLinksSMS',
            {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Channel-Type': 'WEB'
                },
                body: JSON.stringify({
                    msisdn: phone
                })
            }
        );

        const data = await response.json();

        if (response.ok) {
            status.innerText =
                `✅ ${data.message} (Code: ${data.responseCode})`;
        } else {
            status.innerText =
                `❌ فشل الطلب (${response.status})`;
        }

        console.log(data);

    } catch (err) {
        console.error(err);
        status.innerText = "❌ حدث خطأ أثناء الاتصال";
    }
}
</script>

</body>
</html>
