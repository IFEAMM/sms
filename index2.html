<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS Sender with Log</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    width: 90%;
    max-width: 450px;
    text-align: center;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    box-sizing: border-box;
}

input {
    background: #334155;
    color: white;
}

button {
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

#status {
    margin-top: 10px;
    min-height: 20px;
}

#log {
    margin-top: 15px;
    background: #0b1220;
    padding: 10px;
    border-radius: 8px;
    max-height: 200px;
    overflow-y: auto;
    font-size: 13px;
    text-align: right;
}
.log-item {
    border-bottom: 1px solid #1e293b;
    padding: 5px 0;
}
.success { color: #22c55e; }
.error { color: #ef4444; }
</style>
</head>

<body>

<div class="card">
    <h3>SMS Sender</h3>

    <input type="tel" id="phone" placeholder="رقم الجوال">
    <input type="number" id="count" placeholder="عدد الرسائل">

    <button onclick="sendSMS()">إرسال</button>

    <div id="status"></div>
    <div id="log"></div>
</div>

<script>
function addLog(message, type = "info") {
    const log = document.getElementById("log");
    const div = document.createElement("div");

    div.className = "log-item " + type;
    div.innerText = message;

    log.prepend(div);
}

async function sendSMS() {
    const phone = document.getElementById('phone').value.trim();
    const count = parseInt(document.getElementById('count').value);
    const status = document.getElementById('status');

    if (!phone || !count) {
        status.innerText = "⚠️ أدخل البيانات";
        return;
    }

    document.getElementById("log").innerHTML = "";

    status.innerText = "📡 بدء الإرسال...";

    for (let i = 0; i < count; i++) {
        try {
            const res = await fetch(
                'https://prodokd.maanaginx.com/care/api/user/sendLinksSMS',
                {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Channel-Type': 'WEB'
                    },
                    body: JSON.stringify({
                        msisdn: phone
                    })
                }
            );

            const data = await res.json();

            if (res.ok) {
                addLog(`✅ [${i+1}] تم الإرسال: ${data.message}`, "success");
            } else {
                addLog(`❌ [${i+1}] فشل: ${res.status}`, "error");
            }

            console.log(data);

        } catch (err) {
            addLog(`❌ [${i+1}] خطأ في الاتصال`, "error");
            console.error(err);
        }
    }

    status.innerText = "✅ انتهى الإرسال";
}
</script>

</body>
</html>
